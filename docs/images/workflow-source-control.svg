<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">VS Code source control view with agent branches and OpenSpec files</title>
  <desc id="desc">A frontend-style source control layout showing two active agent branches. Each branch change list includes OpenSpec tasks.md and spec.md files along with implementation files.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b111b"/>
      <stop offset="100%" stop-color="#101a2a"/>
    </linearGradient>
    <linearGradient id="topbar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2332"/>
      <stop offset="100%" stop-color="#151b28"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="820" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="40" fill="url(#topbar)"/>
  <text x="18" y="26" fill="#d6e3ff" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="14" font-weight="600">VS CODE</text>
  <text x="86" y="26" fill="#7dd3fc" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="13">LIVE</text>
  <text x="1120" y="26" fill="#8da2c9" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="12">recodee — Source Control</text>

  <rect x="0" y="40" width="52" height="780" fill="#0e1523"/>
  <circle cx="26" cy="72" r="8" fill="#3b82f6"/>
  <circle cx="26" cy="112" r="8" fill="#64748b"/>
  <circle cx="26" cy="152" r="8" fill="#64748b"/>
  <circle cx="26" cy="192" r="8" fill="#22c55e"/>

  <rect x="52" y="40" width="440" height="780" fill="#111826"/>
  <text x="72" y="72" fill="#dbe7ff" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="13" font-weight="700">SOURCE CONTROL</text>

  <rect x="66" y="86" width="410" height="38" rx="8" fill="#1a2437" stroke="#2a3851"/>
  <text x="80" y="110" fill="#9fb5d8" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="12">dev</text>
  <text x="170" y="110" fill="#6d829f" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="12">base · clean</text>
  <text x="80" y="142" fill="#6f849f" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="11">Baseline branch — no agent activity</text>

  <rect x="66" y="166" width="410" height="248" rx="10" fill="#13233a" stroke="#2563eb"/>
  <text x="80" y="190" fill="#9ec5ff" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="12">agent_codex__dashboard-triage</text>
  <rect x="432" y="175" width="30" height="18" rx="9" fill="#1d4ed8"/>
  <text x="447" y="188" text-anchor="middle" fill="#dbeafe" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="10">5</text>

  <text x="80" y="214" fill="#8ca6c9" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="11">▾ Changes</text>
  <text x="80" y="238" fill="#93c5fd" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11">TS</text>
  <text x="112" y="238" fill="#dbe7ff" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11">feature-flags.ts</text>
  <text x="452" y="238" text-anchor="end" fill="#fbbf24" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11">M</text>

  <text x="80" y="260" fill="#f87171" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11">RS</text>
  <text x="112" y="260" fill="#dbe7ff" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11">reader.rs</text>
  <text x="452" y="260" text-anchor="end" fill="#4ade80" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11">U</text>

  <text x="80" y="282" fill="#f87171" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11">RS</text>
  <text x="112" y="282" fill="#dbe7ff" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11">mod.rs</text>
  <text x="452" y="282" text-anchor="end" fill="#fbbf24" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11">M</text>

  <text x="80" y="306" fill="#a78bfa" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11">OS</text>
  <text x="112" y="306" fill="#dbe7ff" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11">openspec/changes/agent-codex-dashboard-triage/tasks.md</text>
  <text x="452" y="306" text-anchor="end" fill="#4ade80" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11">U</text>

  <text x="80" y="328" fill="#a78bfa" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11">OS</text>
  <text x="112" y="328" fill="#dbe7ff" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11">openspec/changes/agent-codex-dashboard-triage/specs/.../spec.md</text>
  <text x="452" y="328" text-anchor="end" fill="#4ade80" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11">U</text>

  <rect x="66" y="432" width="410" height="248" rx="10" fill="#1e1933" stroke="#6366f1"/>
  <text x="80" y="456" fill="#c4b5fd" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="12">agent_claude__loader-parallel</text>
  <rect x="432" y="441" width="30" height="18" rx="9" fill="#4f46e5"/>
  <text x="447" y="454" text-anchor="middle" fill="#e0e7ff" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="10">5</text>

  <text x="80" y="480" fill="#a6a7e8" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="11">▾ Changes</text>
  <text x="80" y="504" fill="#93c5fd" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11">TSX</text>
  <text x="122" y="504" fill="#dbe7ff" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11">loading-overlay.tsx</text>
  <text x="452" y="504" text-anchor="end" fill="#4ade80" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11">U</text>

  <text x="80" y="526" fill="#93c5fd" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11">TSX</text>
  <text x="122" y="526" fill="#dbe7ff" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11">spinner.tsx</text>
  <text x="452" y="526" text-anchor="end" fill="#fbbf24" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11">M</text>

  <text x="80" y="548" fill="#93c5fd" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11">TS</text>
  <text x="122" y="548" fill="#dbe7ff" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11">navigation-loader.ts</text>
  <text x="452" y="548" text-anchor="end" fill="#fbbf24" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11">M</text>

  <text x="80" y="572" fill="#a78bfa" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11">OS</text>
  <text x="122" y="572" fill="#dbe7ff" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11">openspec/changes/agent-claude-loader-parallel/tasks.md</text>
  <text x="452" y="572" text-anchor="end" fill="#4ade80" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11">U</text>

  <text x="80" y="594" fill="#a78bfa" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11">OS</text>
  <text x="122" y="594" fill="#dbe7ff" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11">openspec/changes/agent-claude-loader-parallel/specs/.../spec.md</text>
  <text x="452" y="594" text-anchor="end" fill="#4ade80" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11">U</text>

  <rect x="512" y="56" width="748" height="744" rx="12" fill="#0f1728" stroke="#25344d"/>
  <rect x="528" y="74" width="716" height="38" rx="8" fill="#17233a"/>
  <text x="544" y="98" fill="#8db0de" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="12">TSX  loading-overlay.tsx</text>

  <text x="548" y="152" fill="#38bdf8" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="14">+ const shouldRender = !navigationSettled &amp;&amp; !suppressLoaderFlash</text>
  <text x="548" y="182" fill="#38bdf8" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="14">+ return shouldRender ? &lt;OverlaySpinner /&gt; : null</text>
  <text x="548" y="212" fill="#38bdf8" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="14">+ setTimeout(() =&gt; setSuppressLoaderFlash(true), 140)</text>

  <rect x="528" y="250" width="716" height="1" fill="#2d3f61"/>
  <text x="548" y="288" fill="#9bb2d6" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="13">Both agent branches now show OpenSpec artifacts inside Changes:</text>
  <text x="548" y="312" fill="#d2def4" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="12">- openspec/changes/&lt;agent-branch&gt;/tasks.md</text>
  <text x="548" y="336" fill="#d2def4" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="12">- openspec/changes/&lt;agent-branch&gt;/specs/&lt;capability&gt;/spec.md</text>

  <rect x="528" y="368" width="716" height="384" rx="10" fill="#111b2d" stroke="#2a3d5a"/>
  <text x="548" y="396" fill="#8db0de" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="12">Why this matters</text>
  <text x="548" y="422" fill="#dbe7ff" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="13">The frontend tutorial now communicates that implementation files and OpenSpec</text>
  <text x="548" y="444" fill="#dbe7ff" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="13">change artifacts are created together in each agent lane.</text>

  <text x="548" y="478" fill="#8db0de" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="12">Legend</text>
  <text x="548" y="502" fill="#4ade80" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="12">U</text>
  <text x="566" y="502" fill="#dbe7ff" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="12">Untracked/new in this branch</text>
  <text x="548" y="524" fill="#fbbf24" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="12">M</text>
  <text x="566" y="524" fill="#dbe7ff" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="12">Modified file</text>
  <text x="548" y="546" fill="#a78bfa" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="12">OS</text>
  <text x="576" y="546" fill="#dbe7ff" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="12">OpenSpec change artifact</text>
</svg>
